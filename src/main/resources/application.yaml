ktor:
  application:
    modules:
      - mtg.app.ApplicationKt.module
  deployment:
    port: 8080

storage:
  jdbc:
    url: ${?DB_URL}
    user: ${?DB_USER}
    password: ${?DB_PASSWORD}
    driver: org.postgresql.Driver
    maxPoolSize: 10

firebase:
  projectId: ${?FIREBASE_PROJECT_ID}

payments:
  defaultCurrency: ${?PAYMENTS_DEFAULT_CURRENCY}
  platformFeePercent: ${?PAYMENTS_PLATFORM_FEE_PERCENT}
  stripe:
    secretKey: ${?STRIPE_SECRET_KEY}
    webhookSecret: ${?STRIPE_WEBHOOK_SECRET}
    country: ${?STRIPE_COUNTRY}
    connectRefreshUrl: ${?STRIPE_CONNECT_REFRESH_URL}
    connectReturnUrl: ${?STRIPE_CONNECT_RETURN_URL}
    checkoutSuccessUrl: ${?STRIPE_CHECKOUT_SUCCESS_URL}
    checkoutCancelUrl: ${?STRIPE_CHECKOUT_CANCEL_URL}
