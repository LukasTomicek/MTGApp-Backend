services:
  postgres:
    image: postgres:16-alpine
    container_name: mtg-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mtg_backend
      POSTGRES_USER: mtg
      POSTGRES_PASSWORD: mtg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
